<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset='utf-8'>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    {% include head-custom.html %}
    {% seo %}
  </head>


  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-3LL6Q0HLCS"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-3LL6Q0HLCS');
  </script>


  <body>

    {% include header.html %}

    <div class="container">
      <section id="main_content">
        {{ content }}
      </section>
    </div>


    <footer>
      <div class="footer-content">
        <div class="footer-copyright">
          © 2025 Owen Chase. All rights reserved. Made with the Jekyll Hacker theme.
        </div>
      </div>
    </footer>

    <script src="{{ '/assets/js/site.js?v=' | append: site.github.build_revision | relative_url }}"></script>


  </body>
</html>
